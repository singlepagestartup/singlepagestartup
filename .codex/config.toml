# Project-local Codex configuration for SPS
# Phase 1 goal: run Codex workflow in parallel with existing .claude workflow.

[agents]
max_threads = 6
max_depth = 2

[profiles.sps-safe]
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.sps-auto]
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.sps-readonly]
approval_policy = "never"
sandbox_mode = "read-only"

# Project-local SPS MCP server. Codex loads this from the repository root
# without writing username-specific project paths to ~/.codex/config.toml.
[mcp_servers.singlepagestartup]
url = "http://127.0.0.1:3001/mcp"
env_http_headers = { "X-RBAC-SECRET-KEY" = "RBAC_SECRET_KEY" }
