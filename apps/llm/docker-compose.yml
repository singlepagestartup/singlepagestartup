services:
  llm:
    build: .
    ports:
      - "8765:8765"
    volumes:
      # Model weights are cached here — persists between container restarts
      - whisper-models:/root/.cache/huggingface
    environment:
      - OLLAMA_URL=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPEN_AI_API_KEY=${OPEN_AI_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - OLLAMA_EMBED_DIMENSIONS=${OLLAMA_EMBED_DIMENSIONS:-768}
      - LLM_PRELOAD_MODEL_IDS=${LLM_PRELOAD_MODEL_IDS:-}
      - LLM_MAX_LOADED_HF_MODELS=${LLM_MAX_LOADED_HF_MODELS:-1}
      - WHISPER_MODEL=${WHISPER_MODEL:-openai/whisper-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8765/health').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - db_network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - db_network

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ollama-models:/root/.ollama
      - ./ollama-init.sh:/usr/local/bin/ollama-init.sh:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - OLLAMA_MODEL_IDS=${OLLAMA_MODEL_IDS:-${OLLAMA_MODELS:-nomic-embed-text}}
    entrypoint: ["/bin/sh"]
    command: ["/usr/local/bin/ollama-init.sh"]
    restart: unless-stopped
    networks:
      - db_network

volumes:
  whisper-models:
  ollama-models:

networks:
  db_network:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_db_network
