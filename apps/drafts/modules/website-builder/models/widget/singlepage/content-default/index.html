<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Website Builder Widget / Content / Default</title>
    <link rel="stylesheet" href="../../../../../../runtime/styles.css" />
  </head>
  <body>
    <main class="min-h-screen bg-[#eaf0f7] text-slate-950 tracking-normal">
      <section
        class="flex min-h-[32.625rem] w-full items-center overflow-hidden bg-[#e2e2e2] py-16 lg:py-24"
        data-ds-block="website-builder.widget.content-default"
      >
        <div
          class="mx-auto grid min-h-[32.625rem] w-full max-w-7xl items-center gap-10 bg-white px-6 py-5 lg:grid-cols-2 lg:px-0"
        >
          <div class="flex flex-col gap-5">
            <p
              class="m-0 inline-flex items-center gap-1 text-sm leading-5 text-[#040404]"
              aria-label="Counter: 1"
            >
              <span class="font-semibold">Counter:</span>
              <span>1</span>
            </p>
            <p
              class="m-0 text-base font-semibold leading-6 tracking-normal text-[#0b55f4]"
            >
              SinglePageStartup
            </p>
            <h1
              class="m-0 max-w-[11ch] text-5xl font-semibold leading-none tracking-normal text-[#060611] lg:text-7xl"
            >
              Launch a startup-specific landing page before the backend exists.
            </h1>
            <p class="m-0 max-w-[38rem] text-base leading-7 text-[#404040]">
              Use the singlepage draft system to test the offer, structure, and
              visual language quickly, then promote only approved decisions.
            </p>
            <div class="flex flex-wrap items-center gap-3 pt-1">
              <a
                class="inline-flex min-h-11 items-center justify-center rounded-md border border-slate-950 bg-slate-950 px-4 py-3 text-sm font-semibold leading-none text-white no-underline transition hover:-translate-y-px hover:bg-slate-800"
                href="#contact"
              >
                Start prototype
              </a>
              <a
                class="inline-flex min-h-11 items-center justify-center rounded-md border border-slate-300 bg-white px-4 py-3 text-sm font-semibold leading-none text-slate-700 no-underline transition hover:-translate-y-px hover:bg-slate-50"
                href="#sections"
              >
                View blocks
              </a>
            </div>
          </div>

          <div
            class="flex aspect-[356/335] min-h-72 w-full items-center justify-center overflow-hidden rounded-[1.75rem] bg-gradient-to-br from-blue-600 via-teal-500 to-amber-500"
            aria-label="Prototype snapshot"
          >
            <img
              class="h-full w-full object-cover"
              src="./assets/content-default-media.png"
              alt="Prototype snapshot"
            />
          </div>
        </div>
      </section>
    </main>
    <script src="../../../../../../runtime/runtime.js" defer></script>
    <script src="./script.js" defer></script>
  </body>
</html>
