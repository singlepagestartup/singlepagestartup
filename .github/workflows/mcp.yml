name: Update mcp

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      TAG:
        required: true
        type: string
      PRERELEASE:
        required: true
        type: boolean

jobs:
  trigger-service-update:
    name: Update service
    runs-on: ubuntu-latest
    steps:
      - name: Send webhook for preview service update
        if: ${{ inputs.PRERELEASE == true }}
        run: curl --fail --silent --show-error --max-time 40 --request POST "${{ secrets.PREVIEW_PORTAINER_MCP_UPDATE_URL }}?tag=${{ inputs.TAG }}"

      - name: Send webhook for production service update
        if: ${{ inputs.PRERELEASE == false }}
        run: curl --fail --silent --show-error --max-time 40 --request POST "${{ secrets.PORTAINER_MCP_UPDATE_URL }}?tag=${{ inputs.TAG }}"
