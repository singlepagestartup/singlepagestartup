name: Create frontend and backend release

on:
  release:
    types:
      - released
      - prereleased

concurrency:
  group: release-deployment-${{ github.event.release.prerelease && 'preview' || 'production' }}
  cancel-in-progress: false

jobs:
  docker-image:
    uses: ./.github/workflows/docker-image.yml
    secrets: inherit
    with:
      TAG: ${{ github.event.release.tag_name }}
      PRERELEASE: ${{ github.event.release.prerelease }}

  prepare-docker-images:
    uses: ./.github/workflows/prepare-docker-images.yml
    secrets: inherit
    needs:
      - docker-image
    with:
      TAG: ${{ github.event.release.tag_name }}
      PRERELEASE: ${{ github.event.release.prerelease }}

  update-api:
    uses: ./.github/workflows/api.yml
    secrets: inherit
    needs:
      - prepare-docker-images
    with:
      TAG: ${{ github.event.release.tag_name }}
      PRERELEASE: ${{ github.event.release.prerelease }}

  update-llm:
    uses: ./.github/workflows/llm.yml
    secrets: inherit
    needs:
      - docker-image
      - update-api
    with:
      TAG: ${{ github.event.release.tag_name }}
      PRERELEASE: ${{ github.event.release.prerelease }}

  update-host:
    uses: ./.github/workflows/host.yml
    secrets: inherit
    needs:
      - docker-image
      - update-api
    with:
      TAG: ${{ github.event.release.tag_name }}
      PRERELEASE: ${{ github.event.release.prerelease }}

  update-mcp:
    uses: ./.github/workflows/mcp.yml
    secrets: inherit
    needs:
      - docker-image
      - update-api
    with:
      TAG: ${{ github.event.release.tag_name }}
      PRERELEASE: ${{ github.event.release.prerelease }}

  update-telegram:
    uses: ./.github/workflows/telegram.yml
    secrets: inherit
    needs:
      - docker-image
      - update-api
    with:
      TAG: ${{ github.event.release.tag_name }}
      PRERELEASE: ${{ github.event.release.prerelease }}
