---
- name: Install Node.js
  hosts: all
  become: true
  tasks:
    - name: Install NodeSource repository prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes
        lock_timeout: 120

    - name: Create apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install NodeSource repository signing key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: "0644"
        force: yes

    - name: Configure Node.js 24 repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/nodesource.asc]
          https://deb.nodesource.com/node_24.x nodistro main
        filename: nodesource
        state: present
        update_cache: yes

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        lock_timeout: 120

    - name: Verify Node.js installation
      ansible.builtin.command: node --version
      changed_when: false

    - name: Verify npm installation
      ansible.builtin.command: npm --version
      changed_when: false
