---
- name: Install Docker to server
  hosts: all
  become: yes
  tasks:
    - name: Verify supported Ubuntu host
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_architecture in ["x86_64", "aarch64"]
        fail_msg: >-
          Docker deployment supports Ubuntu on x86_64 or aarch64 hosts.
          Detected {{ ansible_distribution }} {{ ansible_architecture }}.

    - name: Resolve Docker repository architecture
      ansible.builtin.set_fact:
        docker_apt_architecture: >-
          {{ "amd64" if ansible_architecture == "x86_64" else "arm64" }}

    - name: Install Docker repository prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes
        lock_timeout: 120

    - name: Create apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker repository signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: yes

    - name: Configure Docker repository for installed Ubuntu release
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_apt_architecture }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
        update_cache: yes

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - containerd.io
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
        state: present
        lock_timeout: 120

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        enabled: yes
        state: started

    - name: Allow deployment user to use Docker without sudo
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups:
          - docker
        append: yes

    - name: Create Python virtual environment for deployment modules
      ansible.builtin.command: python3 -m venv /opt/venv
      args:
        creates: /opt/venv/bin/python
