---
- name: Delete llm
  hosts: all
  become: yes
  vars:
    service_name: "{{ SERVICE_NAME }}"
  tasks:
    - name: Remove llm stack
      shell: docker stack rm {{ service_name }}
      register: result
      failed_when: result.rc != 0
      ignore_errors: false

    - name: Debug result of removing llm stack
      debug:
        var: result

    - name: Ensure llm stack is removed
      shell: docker stack ls | grep {{ service_name }}
      register: check_llm
      failed_when: check_llm.rc == 0
      ignore_errors: true

    - name: Delete env file
      file:
        path: "/home/code/{{ service_name }}.env"
        state: absent

    - name: Delete docker-compose file
      file:
        path: /home/code/docker-compose.llm.yaml
        state: absent

    - name: Delete webhook info file
      file:
        path: /home/code/llm_webhook.json
        state: absent

    - name: Delete webhook token file
      file:
        path: /home/code/llm_webhook_token
        state: absent
