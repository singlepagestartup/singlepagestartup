---
- name: Create certbot
  hosts: all
  become: yes
  vars:
    service_name: "{{ SERVICE_NAME }}"
  tasks:
    - name: Copy docker-compose file
      ansible.builtin.template:
        src: docker-compose.certbot.yaml.j2
        dest: /home/code/docker-compose.certbot.yaml

    - name: Create certbot challenge directory
      file:
        path: /home/code/certbot/.well-known/acme-challenge
        state: directory
        mode: "0755"
        recurse: yes

    - name: Create shared Traefik overlay network
      ansible.builtin.shell: >-
        docker network create --driver overlay --attachable traefik_overlay
      register: network_result
      changed_when: network_result.rc == 0
      failed_when:
        - network_result.rc != 0
        - "'already exists' not in network_result.stderr"

    - name: Run certbot service
      shell: docker stack deploy --compose-file=/home/code/docker-compose.certbot.yaml certbot
