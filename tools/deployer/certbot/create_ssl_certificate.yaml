---
- name: Create SSL certificate with certbot
  hosts: all
  become: yes
  vars:
    fqdn: "{{ SERVICE_URL }}"
    email: "{{ CERTBOT_EMAIL }}"
  tasks:
    - name: Ensure webroot path exists
      file:
        path: /home/code/certbot/.well-known/acme-challenge
        state: directory
        mode: "0755"
        recurse: yes

    - name: Ensure /home/code/certs directory exists
      file:
        path: /home/code/certs
        state: directory
        mode: "0755"

    - name: Create ACME webroot routing probe
      ansible.builtin.copy:
        content: sps-certbot-webroot-ok
        dest: /home/code/certbot/.well-known/acme-challenge/sps-webroot-check
        mode: "0644"

    - name: Verify ACME webroot is publicly reachable
      ansible.builtin.uri:
        url: "http://{{ fqdn }}/.well-known/acme-challenge/sps-webroot-check"
        method: GET
        return_content: yes
        status_code: 200
        timeout: 10
      register: acme_webroot_probe
      until:
        - acme_webroot_probe.status == 200
        - acme_webroot_probe.content == "sps-certbot-webroot-ok"
      retries: 30
      delay: 5

    - name: Create SSL certificate using certbot webroot
      command: >
        certbot certonly --webroot -w /home/code/certbot
        -d {{ fqdn }}
        --email {{ email }}
        --agree-tos --no-eff-email --non-interactive
      args:
        creates: "/etc/letsencrypt/live/{{ fqdn }}/fullchain.pem"

    - name: Copy fullchain.pem to /certs
      copy:
        remote_src: yes
        src: "/etc/letsencrypt/live/{{ fqdn }}/fullchain.pem"
        dest: "/home/code/certs/{{ fqdn }}.crt"

    - name: Copy privkey.pem to /certs
      copy:
        remote_src: yes
        src: "/etc/letsencrypt/live/{{ fqdn }}/privkey.pem"
        dest: "/home/code/certs/{{ fqdn }}.key"

    - name: Delete ACME webroot routing probe
      ansible.builtin.file:
        path: /home/code/certbot/.well-known/acme-challenge/sps-webroot-check
        state: absent
