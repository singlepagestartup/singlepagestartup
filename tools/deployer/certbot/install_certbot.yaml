---
- name: Install certbot
  hosts: all
  become: yes
  tasks:
    - name: Install Certbot webroot client
      ansible.builtin.apt:
        name: certbot
        state: present
        update_cache: yes
        lock_timeout: 120

    - name: Remove unused Certbot nginx plugin
      ansible.builtin.apt:
        name: python3-certbot-nginx
        state: absent
        lock_timeout: 120

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Stop system nginx that conflicts with Traefik port 80
      ansible.builtin.service:
        name: nginx
        state: stopped
        enabled: no
      when: "'nginx.service' in ansible_facts.services"

    - name: Check certbot installed
      ansible.builtin.command: certbot --version
      register: certbot_check
      changed_when: false
      failed_when: certbot_check.rc != 0
